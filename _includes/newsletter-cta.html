<div class="newsletter-band reveal">
  <div class="pattern-layer" aria-hidden="true" style="opacity:0.05;"></div>
  <div>
    <h3>Stay Updated</h3>
    <p>Receive practical volunteer engagement insights delivered directly to your inbox.</p>
  </div>
  <form class="newsletter-inline-form" onsubmit="return vecNewsletterSubmit(event)" style="display:flex; gap:10px; flex-wrap:wrap; position:relative; z-index:1;">
    <input type="email" required placeholder="Your email address" aria-label="Email address"
      style="padding:14px 18px; border-radius:100px; border:none; font-family:var(--sans); font-size:13.5px; min-width:220px;">
    <button type="submit" class="btn btn-gold">Subscribe</button>
  </form>
</div>
